# Nếu bạn import dump mới dưới tên DB khác, chỉ cần đổi `defaultdb` bên dưới.
spring.datasource.url=jdbc:mysql://localhost:3306/defaultdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
# Ưu tiên tên cột được khai báo rõ bằng @Column để khớp tuyệt đối với schema SQL.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=NewSkyEnglish2025SecretKeyForJWTTokenGenerationMustBeLong
jwt.expiration=86400000
