server.port=${PORT:8080}
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
# QUAN TRỌNG: giữ nguyên tên cột, không auto convert camelCase
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=NewSkyEnglish2025SecretKeyForJWTTokenGenerationMustBeLong
jwt.expiration=86400000

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
app.mail.registration.enabled=${APP_MAIL_REGISTRATION_ENABLED:true}
app.mail.from=${APP_MAIL_FROM:${MAIL_USERNAME:}}
app.mail.brand-name=NewSky English
app.registration.otp.expire-minutes=${APP_REGISTRATION_OTP_EXPIRE_MINUTES:5}
app.registration.otp.resend-seconds=${APP_REGISTRATION_OTP_RESEND_SECONDS:60}
app.payment.bank.bank-name=${APP_PAYMENT_BANK_NAME:MB Bank}
app.payment.bank.bank-bin=${APP_PAYMENT_BANK_BIN:970422}
app.payment.bank.account-number=${APP_PAYMENT_BANK_ACCOUNT_NUMBER:0123456789}
app.payment.bank.account-name=${APP_PAYMENT_BANK_ACCOUNT_NAME:NEW SKY ENGLISH}
app.payment.vnpay.display-name=${APP_PAYMENT_VNPAY_DISPLAY_NAME:VNPAY Demo}
app.payment.momo.display-name=${APP_PAYMENT_MOMO_DISPLAY_NAME:MoMo Demo}
app.payment.momo.wallet-id=${APP_PAYMENT_MOMO_WALLET_ID:0900000000}
